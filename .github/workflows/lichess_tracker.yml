name: Lichess Tactics Tracker

concurrency:
  group: tactics-tracker
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 * * * *"   # jede volle Stunde
  workflow_dispatch:        # manuell auslösbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Lichess stats
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python fetch_lichess_stats.py

      - name: Generate leaderboard
        run: python generate_leaderboard.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          # Commit, but don't fail if nothing changed
          git commit -m "chore: tactics snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"

          # Retry push with rebase to handle parallel runs
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done

      # Keep-alive: prevents GitHub from disabling scheduled workflows
      # after 60 days of repo inactivity
      - name: Keep workflow alive
        uses: actions/github-script@v7
        if: github.event_name == 'schedule'
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({ owner, repo, workflow_id: wf.id });
                console.log(`Re-enabled: ${wf.name}`);
              }
            }
